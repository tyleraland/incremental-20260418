name: PR Preview

# Builds a throwaway preview for every open PR and publishes it under
# gh-pages:/pr-preview/pr-<N>/. The preview is updated on each push and
# automatically torn down when the PR closes (rossjrw/pr-preview-action).
on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write       # push the preview to the gh-pages branch
  pull-requests: write  # post/update the "preview is live" PR comment

# Coverage for the codemap Coverage lens (~1 min). ON by default; set to 'false'
# here or via repo variable CODEMAP_COVERAGE=false for faster previews.
env:
  CODEMAP_COVERAGE: ${{ vars.CODEMAP_COVERAGE || 'true' }}

# Share the gh-pages writer lock with the main deploy so pushes don't collide.
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # On a 'closed' event we only need to remove the preview, so skip the build.
      - uses: actions/setup-node@v4
        if: github.event.action != 'closed'
        with:
          node-version-file: .nvmrc   # match deploy/CI (Node 22) — the prebuild gate requires it

      - run: npm install
        if: github.event.action != 'closed'

      - run: npm run build
        if: github.event.action != 'closed'
        env:
          # Must match where the preview is served from, or asset URLs 404.
          BASE_PATH: /incremental-20260418/pr-preview/pr-${{ github.event.number }}/

      # Test coverage for the codemap Coverage lens (non-fatal; gated by CODEMAP_COVERAGE).
      - name: Coverage (for codemap)
        if: github.event.action != 'closed' && env.CODEMAP_COVERAGE != 'false'
        run: npm run coverage || echo "coverage run failed; Coverage lens will show unavailable"

      # Codemap viewer (relative asset paths, so it works under the preview base).
      - name: Build codemap
        if: github.event.action != 'closed'
        run: |
          cd tools/codemap
          npm install
          npm run build
          mkdir -p "$GITHUB_WORKSPACE/dist/codemap"
          cp -R dist/. "$GITHUB_WORKSPACE/dist/codemap/"

      - uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./dist
          umbrella-dir: pr-preview
