name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Publishing to the gh-pages branch needs write access to repo contents.
permissions:
  contents: write

# Serialize every writer of the gh-pages branch (this job + PR previews) so
# concurrent pushes don't collide. Don't cancel in-flight deploys — let them
# finish and queue, otherwise a cancelled push can leave the branch half-written.
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need enough history for `git log -5` in vite.config.ts to fill the
          # Debug timeline. 0 = full history.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build
        env:
          BASE_PATH: /incremental-20260418/

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Publish to the root of gh-pages, but KEEP existing files so we don't
          # wipe the pr-preview/ directory the PR-preview workflow maintains.
          keep_files: true
