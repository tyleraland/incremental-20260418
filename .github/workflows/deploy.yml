name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Publishing to the gh-pages branch needs write access to repo contents.
permissions:
  contents: write

# Codemap's Coverage lens needs a `vitest run --coverage` (~1 min). ON by default.
# To skip it for a faster deploy: flip this to 'false' here, OR — without editing
# the file — set repo variable CODEMAP_COVERAGE=false (Settings → Secrets and
# variables → Actions → Variables). The lens then falls back to "unavailable".
env:
  CODEMAP_COVERAGE: ${{ vars.CODEMAP_COVERAGE || 'true' }}

# Serialize every writer of the gh-pages branch (this job + PR previews) so
# concurrent pushes don't collide. Don't cancel in-flight deploys — let them
# finish and queue, otherwise a cancelled push can leave the branch half-written.
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need enough history for `git log -5` in vite.config.ts to fill the
          # Debug timeline. 0 = full history.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc   # match dev/CI (Node 22) — no version drift
          cache: npm

      - run: npm ci                    # reproducible install from the committed lock

      - run: npm run build
        env:
          BASE_PATH: /incremental-20260418/

      # Test coverage for the codemap's Coverage lens. Gated by CODEMAP_COVERAGE
      # (see top of file). Non-fatal: a red test must not block the deploy — the
      # lens just falls back to "unavailable".
      - name: Coverage (for codemap)
        if: env.CODEMAP_COVERAGE != 'false'
        run: npm run coverage || echo "coverage run failed; Coverage lens will show unavailable"

      # Deterministic codebase map, built from its own isolated package (its deps
      # never touch the game bundle) into dist/codemap so it ships with the same
      # publish. Reads ../../coverage/coverage-final.json if present. Served at
      # /incremental-20260418/codemap/.
      - name: Build codemap
        run: |
          cd tools/codemap
          npm ci
          npm run build
          mkdir -p "$GITHUB_WORKSPACE/dist/codemap"
          cp -R dist/. "$GITHUB_WORKSPACE/dist/codemap/"

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Publish to the root of gh-pages, but KEEP existing files so we don't
          # wipe the pr-preview/ directory the PR-preview workflow maintains.
          keep_files: true
